<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Pelanggan - HomeService</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        .auth-container {
            display: flex;
            min-height: 100vh;
        }

        .auth-left {
            flex: 1;
            background: #10B981;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
        }

        .auth-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: #f9fafb;
        }

        .auth-content {
            max-width: 400px;
            width: 100%;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #10B981;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-login:hover {
            background: #059669;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-left">
            <h1>Halo, Pelanggan!</h1>
            <p>Login untuk melihat riwayat pesanan kamu.</p>
        </div>
        <div class="auth-right">
            <div class="auth-content">
                <h2 style="margin-bottom: 20px;">Login Pelanggan</h2>
                <form id="customerLoginForm">
                    <input type="email" id="email" class="form-input" placeholder="Email kamu" required>
                    <input type="password" id="password" class="form-input" placeholder="Password" required>
                    <button type="submit" class="btn-login">Masuk</button>
                </form>
                <p style="margin-top: 15px; text-align: center;">
                    Belum punya akun? <a href="customer-register.html" style="color: #10B981;">Daftar di sini</a>
                </p>
                <p style="margin-top: 10px; text-align: center;">
                    <a href="index.html" style="color: #6b7280;">← Kembali ke Beranda</a>
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkZd7mkg6T6j1iCg15gsc02-EF97gajXE",
            authDomain: "home-service-bengkalis.firebaseapp.com",
            projectId: "home-service-bengkalis",
            storageBucket: "home-service-bengkalis.firebasestorage.app",
            messagingSenderId: "901348636964",
            appId: "1:901348636964:web:d5a8f40e6d48d17f1d5bb1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('customerLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = 'customer-dashboard.html';
            } catch (error) {
                alert('Login gagal: ' + error.message);
            }
        });
    </script>
</body>

</html>
