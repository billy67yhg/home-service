<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Mitra - HomeService</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .status-pending {
            background: #FEF3C7;
            color: #92400E;
        }

        .status-approved {
            background: #D1FAE5;
            color: #065F46;
        }

        .status-rejected {
            background: #FEE2E2;
            color: #991B1B;
        }

        .action-btn {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }

        .action-btn:hover {
            background: #F3F4F6;
        }

        .action-btn.approve {
            color: #10B981;
            border-color: #10B981;
        }

        .action-btn.approve:hover {
            background: #D1FAE5;
        }

        .action-btn.reject {
            color: #EF4444;
            border-color: #EF4444;
        }

        .action-btn.reject:hover {
            background: #FEE2E2;
        }

        .detail-popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .popup-content {
            background: white;
            padding: 24px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f3f4f6;
            font-size: 0.9rem;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: #6B7280;
        }

        .detail-value {
            font-weight: 500;
            text-align: right;
            max-width: 60%;
            word-break: break-word;
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <div class="brand">HomeService</div>
            <div class="admin-profile">
                <div class="admin-avatar">AD</div>
                <div class="admin-info">
                    <div>Super Admin</div><small>Platform Owner</small>
                </div>
            </div>
            <a href="dashboard.html" class="nav-item"><i class="fas fa-chart-pie"></i> Dashboard</a>
            <!-- TAMBAHKAN LINK INI DI SIDEBAR KAMU -->
            <a href="verifikasi-mitra.html" class="nav-item active"><i class="fas fa-user-check"></i> Verifikasi
                Mitra</a>
            <a href="teknisi.html" class="nav-item"><i class="fas fa-user-gear"></i> Teknisi</a>
            <a href="pesanan.html" class="nav-item"><i class="fas fa-clipboard-list"></i> Pesanan</a>
            <a href="#" class="logout-btn"><i class="fas fa-right-from-bracket"></i> Logout</a>
        </aside>

        <!-- MAIN -->
        <main class="main-content">
            <div class="topbar">
                <h2 class="page-title">Verifikasi Pendaftaran Mitra</h2>
            </div>

            <div class="filter-tabs" style="margin-bottom: 20px;" id="filterTabs">
                <div class="filter-tab active" data-filter="pending">Menunggu (0)</div>
                <div class="filter-tab" data-filter="approved">Disetujui (0)</div>
                <div class="filter-tab" data-filter="rejected">Ditolak (0)</div>
            </div>

            <div class="table-card">
                <div class="table-responsive">
                    <table>
                        <thead>
                            <tr>
                                <th>Nama Toko</th>
                                <th>Pemilik</th>
                                <th>Email</th>
                                <th>Lokasi</th>
                                <th>Status</th>
                                <th>Tanggal Daftar</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="mitraTableBody">
                            <tr>
                                <td colspan="7" style="text-align:center;padding:30px;">Memuat data...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- POPUP DETAIL -->
    <div id="detailPopup" class="detail-popup">
        <div class="popup-content">
            <h3 style="margin-bottom:15px;">📄 Detail Pendaftaran</h3>
            <div id="detailContent"></div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button class="btn-cancel" onclick="closeDetail()"
                    style="flex:1; padding:10px; border:none; border-radius:8px; cursor:pointer; background:#F3F4F6;">Tutup</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkZd7mkg6T6j1iCg15gsc02-EF97gajXE",
            authDomain: "home-service-bengkalis.firebaseapp.com",
            projectId: "home-service-bengkalis",
            storageBucket: "home-service-bengkalis.firebasestorage.app",
            messagingSenderId: "901348636964",
            appId: "1:901348636964:web:d5a8f40e6d48d17f1d5bb1"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let mitraData = [];
        let currentFilter = 'pending';
        let currentDetailId = null;

        async function loadMitra() {
            try {
                const q = query(collection(db, "cabang"), orderBy("createdAt", "desc"));
                const snapshot = await getDocs(q);
                mitraData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                updateCounts();
                renderTable();
            } catch (error) {
                console.error(error);
                document.getElementById('mitraTableBody').innerHTML = `<tr><td colspan="7" style="color:red;">Gagal memuat data</td></tr>`;
            }
        }

        function updateCounts() {
            const pending = mitraData.filter(m => m.status === 'pending').length;
            const approved = mitraData.filter(m => m.status === 'approved').length;
            const rejected = mitraData.filter(m => m.status === 'rejected').length;

            document.querySelectorAll('.filter-tab').forEach((tab, i) => {
                const counts = [pending, approved, rejected];
                tab.textContent = tab.textContent.replace(/\(.*\)/, `(${counts[i]})`);
            });
        }

        function renderTable() {
            const tbody = document.getElementById('mitraTableBody');
            const filtered = mitraData.filter(m => m.status === currentFilter);

            if (filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:30px;color:#6B7280;">Tidak ada data ${currentFilter}</td></tr>`;
                return;
            }

            tbody.innerHTML = filtered.map(m => `
                <tr>
                    <td><strong>${m.namaToko || '-'}</strong></td>
                    <td>${m.namaPemilik || '-'}</td>
                    <td style="font-size:0.85rem;">${m.email || '-'}</td>
                    <td style="font-size:0.85rem;">${m.lokasi || '-'}</td>
                    <td><span class="status-badge status-${m.status}">${m.status.toUpperCase()}</span></td>
                    <td style="font-size:0.85rem;">${m.createdAt ? new Date(m.createdAt).toLocaleDateString('id-ID') : '-'}</td>
                    <td>
                        <div style="display:flex; gap:8px;">
                            <button class="action-btn" onclick="showDetail('${m.id}')" title="Lihat Detail"><i class="fas fa-eye"></i></button>
                            ${m.status === 'pending' ? `
                                <button class="action-btn approve" onclick="updateStatus('${m.id}', 'approved')" title="Setujui"><i class="fas fa-check"></i></button>
                                <button class="action-btn reject" onclick="updateStatus('${m.id}', 'rejected')" title="Tolak"><i class="fas fa-times"></i></button>
                            ` : ''}
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        window.showDetail = (id) => {
            const m = mitraData.find(x => x.id === id);
            if (!m) return;
            currentDetailId = id;
            document.getElementById('detailContent').innerHTML = `
                <div class="detail-row"><span class="detail-label">Nama Toko</span><span class="detail-value">${m.namaToko}</span></div>
                <div class="detail-row"><span class="detail-label">Pemilik</span><span class="detail-value">${m.namaPemilik}</span></div>
                <div class="detail-row"><span class="detail-label">Email</span><span class="detail-value">${m.email}</span></div>
                <div class="detail-row"><span class="detail-label">No. Telepon</span><span class="detail-value">${m.noTelepon || '-'}</span></div>
                <div class="detail-row"><span class="detail-label">Lokasi</span><span class="detail-value">${m.lokasi}</span></div>
                <div class="detail-row"><span class="detail-label">No. Rekening</span><span class="detail-value">${m.noRekening || '-'}</span></div>
                <div class="detail-row"><span class="detail-label">Jenis Layanan</span><span class="detail-value">${m.jenisLayanan || '-'}</span></div>
                <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value"><span class="status-badge status-${m.status}">${m.status}</span></span></div>
            `;
            document.getElementById('detailPopup').style.display = 'flex';
        };

        window.closeDetail = () => {
            document.getElementById('detailPopup').style.display = 'none';
            currentDetailId = null;
        };

        window.updateStatus = async (id, newStatus) => {
            const action = newStatus === 'approved' ? 'SETUJUI' : 'TOLAK';
            if (!confirm(`Yakin ingin ${action} pendaftaran ini?`)) return;

            try {
                await updateDoc(doc(db, "cabang", id), {
                    status: newStatus,
                    approvedAt: new Date().toISOString()
                });
                alert(`✅ Mitra berhasil di-${action}!`);
                loadMitra();
            } catch (error) {
                alert('Gagal: ' + error.message);
            }
        };

        document.getElementById('filterTabs').addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-tab')) {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.dataset.filter;
                renderTable();
            }
        });

        // Init
        loadMitra();
    </script>
</body>

</html>
