<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Teknisi - HomeService</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #10B981;
            font-size: 2rem;
            margin-bottom: 5px;
        }

        .logo p {
            color: #6B7280;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #D1D5DB;
            border-radius: 8px;
            font-size: 1rem;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #10B981;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-login:hover {
            background: #059669;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #10B981;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <div class="logo">
            <h1><i class="fas fa-user-gear"></i> Teknisi</h1>
            <p>HomeService Portal</p>
        </div>
        <form id="technicianLoginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="email@homeservice.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-login">Masuk Dashboard</button>
        </form>
        <div class="back-link">
            <a href="index.html">← Kembali ke Beranda</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkZd7mkg6T6j1iCg15gsc02-EF97gajXE",
            authDomain: "home-service-bengkalis.firebaseapp.com",
            projectId: "home-service-bengkalis",
            storageBucket: "home-service-bengkalis.firebasestorage.app",
            messagingSenderId: "901348636964",
            appId: "1:901348636964:web:d5a8f40e6d48d17f1d5bb1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('technicianLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                // 1. Login dengan Firebase Auth
                await signInWithEmailAndPassword(auth, email, password);

                // 2. Cek apakah user ini teknisi di Firestore
                const q = query(collection(db, "teknisi"), where("email", "==", email));
                const snapshot = await getDocs(q);

                if (snapshot.empty) {
                    alert('Akun tidak terdaftar sebagai teknisi!');
                    await signOut(auth);
                    return;
                }

                const teknisiData = snapshot.docs[0].data();
                const cabangId = snapshot.docs[0].id; // Atau pakai field cabangId jika ada

                // 3. Cek status aktif
                if (teknisiData.status !== 'Aktif') {
                    alert('Akun teknisi tidak aktif (Cuti/Libur). Hubungi admin jasa Anda.');
                    await signOut(auth);
                    return;
                }

                // 4. Simpan info teknisi di localStorage untuk dashboard
                localStorage.setItem('teknisiInfo', JSON.stringify({
                    uid: snapshot.docs[0].id,
                    nama: teknisiData.nama,
                    email: teknisiData.email,
                    cabangId: teknisiData.cabangId,
                    keahlian: teknisiData.keahlian
                }));

                // 5. Redirect ke dashboard teknisi
                window.location.href = 'technician-dashboard.html';

            } catch (error) {
                console.error('Login error:', error);
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') {
                    alert('❌ Email atau password salah!');
                } else if (error.code === 'auth/user-not-found') {
                    alert('❌ Akun tidak ditemukan!');
                } else {
                    alert('❌ Login gagal: ' + error.message);
                }
            }
        });
    </script>
</body>

</html>
