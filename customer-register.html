<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Pelanggan - HomeService</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        .auth-container {
            display: flex;
            min-height: 100vh;
        }

        .auth-left {
            flex: 1;
            background: #10B981;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
        }

        .auth-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: #f9fafb;
        }

        .auth-content {
            max-width: 400px;
            width: 100%;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .btn-register {
            width: 100%;
            padding: 12px;
            background: #10B981;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-left">
            <h1>Bergabung Yuk!</h1>
            <p>Daftar sekarang untuk kemudahan booking layanan rumah.</p>
        </div>
        <div class="auth-right">
            <div class="auth-content">
                <h2 style="margin-bottom: 20px;">Daftar Akun Baru</h2>
                <form id="customerRegisterForm">
                    <input type="text" id="nama" class="form-input" placeholder="Nama Lengkap" required>
                    <input type="tel" id="phone" class="form-input" placeholder="Nomor HP" required>
                    <input type="email" id="email" class="form-input" placeholder="Email" required>
                    <input type="password" id="password" class="form-input" placeholder="Password" required>
                    <button type="submit" class="btn-register">Daftar Sekarang</button>
                </form>
                <p style="margin-top: 15px; text-align: center;">
                    Sudah punya akun? <a href="customer-login.html" style="color: #10B981;">Login di sini</a>
                </p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkZd7mkg6T6j1iCg15gsc02-EF97gajXE",
            authDomain: "home-service-bengkalis.firebaseapp.com",
            projectId: "home-service-bengkalis",
            storageBucket: "home-service-bengkalis.firebasestorage.app",
            messagingSenderId: "901348636964",
            appId: "1:901348636964:web:d5a8f40e6d48d17f1d5bb1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        document.getElementById('customerRegisterForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nama = document.getElementById('nama').value;
            const phone = document.getElementById('phone').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                await setDoc(doc(db, "users", user.uid), {
                    nama: nama,
                    email: email,
                    phone: phone,
                    role: 'customer',
                    createdAt: new Date().toISOString()
                });

                alert('Registrasi berhasil! Silakan login.');
                window.location.href = 'customer-login.html';
            } catch (error) {
                alert('Gagal daftar: ' + error.message);
            }
        });
    </script>
</body>

</html>
