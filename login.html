<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HomeService</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        .auth-container {
            display: flex;
            min-height: 100vh;
        }

        .auth-left {
            flex: 1;
            background: var(--sidebar-bg);
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
        }

        .auth-right {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: var(--bg-main);
        }

        .auth-content {
            max-width: 450px;
            width: 100%;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .auth-logo h1 {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.95rem;
        }

        .form-input:focus {
            border-color: var(--primary);
            outline: none;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: var(--primary-dark);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            color: var(--text-muted);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .role-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .role-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid var(--border);
            background: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .role-btn:hover {
            background: #F9FAFB;
        }

        .role-btn.active {
            border-color: var(--primary);
            background: #D1FAE5;
            color: #065F46;
            font-weight: 600;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }

        .alert-warning {
            background: #FEF3C7;
            color: #92400E;
            border: 1px solid #F59E0B;
        }

        .alert-success {
            background: #D1FAE5;
            color: #065F46;
            border: 1px solid #10B981;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-left">
            <h1 style="font-size: 2.5rem; margin-bottom: 12px;">HomeService</h1>
            <p style="font-size: 1.1rem; opacity: 0.9;">Platform Login</p>
        </div>
        <div class="auth-right">
            <div class="auth-content">
                <div class="auth-logo">
                    <h1>Selamat Datang Kembali!</h1>
                    <p>Pilih jenis akun Anda</p>
                </div>

                <!-- Pilih Role -->
                <div class="role-selector">
                    <button class="role-btn active" id="btnAdmin" onclick="selectRole('admin')">
                        <i class="fas fa-user-shield"></i> Admin
                    </button>
                    <button class="role-btn" id="btnMitra" onclick="selectRole('mitra')">
                        <i class="fas fa-store"></i> Pemilik Jasa
                    </button>
                </div>

                <div id="alertBox"></div>

                <!-- FORM LOGIN (Untuk Admin & Mitra) -->
                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" id="email" class="form-input" placeholder="Masukkan email Anda" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" id="password" class="form-input" placeholder="Masukkan password"
                            required>
                    </div>
                    <button type="submit" class="btn-login" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>

                <!-- FOOTER -->
                <div class="auth-footer">
                    <p id="footerText">Login sebagai Admin Platform</p>
                    <p style="margin-top: 8px;">
                        Belum punya akun? <a href="register-mitra.html"
                            style="color:var(--primary); font-weight:600;">Daftar Jasa di sini →</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkZd7mkg6T6j1iCg15gsc02-EF97gajXE",
            authDomain: "home-service-bengkalis.firebaseapp.com",
            projectId: "home-service-bengkalis",
            storageBucket: "home-service-bengkalis.firebasestorage.app",
            messagingSenderId: "901348636964",
            appId: "1:901348636964:web:d5a8f40e6d48d17f1d5bb1"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let selectedRole = 'admin';

        // Role selector - Update UI only, form stays visible
        window.selectRole = (role) => {
            selectedRole = role;

            // Update button styles
            document.getElementById('btnAdmin').classList.toggle('active', role === 'admin');
            document.getElementById('btnMitra').classList.toggle('active', role === 'mitra');

            // Update footer text
            const footerText = document.getElementById('footerText');
            if (role === 'admin') {
                footerText.textContent = 'Login sebagai Admin Platform';
            } else {
                footerText.textContent = 'Login sebagai Pemilik Jasa';
            }

            document.getElementById('alertBox').innerHTML = '';
        };

        function showAlert(message, type = 'warning') {
            document.getElementById('alertBox').innerHTML = `<div class="alert alert-${type}">${message}</div>`;
        }

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Memproses...';

            try {
                // 1. Login ke Firebase Auth (sama untuk semua role)
                await signInWithEmailAndPassword(auth, email, password);

                // 2. Cek role & redirect sesuai pilihan
                if (selectedRole === 'admin') {
                    // ADMIN: Cek di collection 'users'
                    const q = query(collection(db, "users"), where("email", "==", email));
                    const snapshot = await getDocs(q);

                    if (!snapshot.empty) {
                        const userData = snapshot.docs[0].data();
                        if (userData.role === 'admin' || userData.role === 'superadmin') {
                            window.location.href = 'dashboard.html';
                        } else {
                            showAlert('❌ Akun ini bukan akun Admin Platform.', 'warning');
                            await auth.signOut();
                        }
                    } else {
                        showAlert('❌ Akun admin tidak ditemukan.', 'warning');
                        await auth.signOut();
                    }

                } else {
                    // MITRA: Cek di collection 'cabang'
                    const q = query(collection(db, "cabang"), where("email", "==", email));
                    const snapshot = await getDocs(q);

                    if (!snapshot.empty) {
                        const mitraData = snapshot.docs[0].data();
                        const cabangId = snapshot.docs[0].id;

                        if (mitraData.status === 'pending') {
                            showAlert('⏳ Pendaftaran Anda masih menunggu verifikasi.', 'warning');
                            await auth.signOut();
                        } else if (mitraData.status === 'rejected') {
                            showAlert('❌ Pendaftaran Anda ditolak.', 'warning');
                            await auth.signOut();
                        } else if (mitraData.status === 'approved') {
                            // Simpan info mitra
                            localStorage.setItem('mitraInfo', JSON.stringify({
                                cabangId: cabangId,
                                namaToko: mitraData.namaToko,
                                namaPemilik: mitraData.namaPemilik,
                                email: mitraData.email
                            }));
                            window.location.href = 'mitra-dashboard.html';
                        }
                    } else {
                        showAlert('❌ Akun mitra tidak ditemukan. Silakan daftar terlebih dahulu.', 'warning');
                        await auth.signOut();
                    }
                }
            } catch (error) {
                console.error('Login error:', error);
                if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') {
                    showAlert('❌ Email atau password salah!', 'warning');
                } else if (error.code === 'auth/user-not-found') {
                    showAlert('❌ Akun tidak ditemukan!', 'warning');
                } else {
                    showAlert('❌ Login gagal: ' + error.message, 'warning');
                }
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login';
            }
        });

        // Init: Set default role to admin
        selectRole('admin');
    </script>
</body>

</html>
